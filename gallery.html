<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery & Kontak - WebGIS Tanjung Riau</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .gallery-container {
            padding: 60px 20px;
            max-width: 850px;
            margin: 0 auto;
        }

        .content-card {
            background: #ffffff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
            border-top: 6px solid #2ecc71;
            margin-top: 50px;
        }

        .content-card h2 {
            color: #2d3748;
            margin-top: 0;
            font-size: 26px;
        }

        .content-card hr {
            border: 0;
            height: 3px;
            background: #2ecc71;
            margin: 20px 0;
            width: 80px;
            border-radius: 2px;
        }

        .content-card h3 {
            color: #4a5568;
            font-size: 18px;
            margin-top: 30px;
            border-left: 4px solid #2ecc71;
            padding-left: 10px;
        }

        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 15px;
        }

        .image-item {
            background: #f7fafc;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            transition: transform 0.3s ease;
            border: 1px solid #e2e8f0;
        }

        .image-item:hover {
            transform: translateY(-5px);
        }

        .image-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }

        .image-caption {
            padding: 12px;
            font-size: 13px;
            color: #4a5568;
            text-align: center;
            background: #ffffff;
            border-top: 1px solid #e2e8f0;
        }

        .profile-card {
            background: #f0fdf4; /* Latar kartu profil hijau muda pudar */
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #bbf7d0;
            margin-top: 15px;
            max-width: 450px;
        }

        .profile-card table {
            width: 100%;
            border-collapse: collapse;
        }

        .profile-card td {
            padding: 6px 0;
            font-size: 15px;
            color: #1e293b;
            vertical-align: top;
        }

        .profile-card td.label {
            font-weight: 600;
            color: #14532d;
            width: 100px;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="map.html">Map</a>
        <a href="gallery.html">Gallery & Kontak</a>
    </nav>
    
    <div class="gallery-container">
        <div class="content-card">
            <h2>Galeri Kegiatan & Informasi Kontak</h2>
            <hr>
            
            <h3>Dokumentasi Lapangan & SIG</h3>
            <div class="image-grid">
                <div class="image-item">
                    <img src="sh.png" alt="Dokumentasi Survei Lapangan">
                    <div class="image-caption">Kegiatan Pemetaan Partisipatif di Lapangan</div>
                </div>
                <div class="image-item">
                    <img src="layout.png" alt="Pengolahan Data SIG">
                    <div class="image-caption">Hasil Pemetaan Partisipatif</div>
                </div>
            </div>
            
            <h3>Profil Pembuat</h3>
            <div class="profile-card">
                <table>
                    <tr>
                        <td class="label">Nama</td>
                        <td>: Imam Prasetya</td>
                    </tr>
                    <tr>
                        <td class="label">NIM</td>
                        <td>: 3322411053</td>
                    </tr>
                    <tr>
                        <td class="label">Kelas</td>
                        <td>: Teknologi Geomatika 4B Malam</td>
                    </tr>
                    <tr>
                        <td class="label">Instansi</td>
                        <td>: Politeknik Negeri Batam</td>
                    </tr>
                </table>
            </div>
        </div>
    </div>

</body>
</html>
