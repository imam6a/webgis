<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map - WebGIS Tanjung Riau</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }

        nav a[href="map.html"] {
            color: #2ecc71;
            background-color: #f0fdf4;
        }

        .map-wrapper {
            position: relative;
            width: 100%;
            height: 100vh;
        }

        .map-container {
            width: 100%;
            height: 100%;
            border: none;
        }

        .info-card {
            position: absolute;
            bottom: 30px;
            left: 20px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(5px);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            z-index: 1000;
            max-width: 280px;
            border-left: 5px solid #2ecc71; /* Aksen hijau muda */
        }

        .info-card h4 {
            margin: 0 0 5px 0;
            color: #2d3748;
            font-size: 14px;
        }

        .info-card p {
            margin: 0;
            color: #718096;
            font-size: 12px;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="map.html">Map</a>
        <a href="gallery.html">Gallery & Kontak</a>
    </nav>

    <div class="map-wrapper">
        <iframe src="peta-qgis2web/index.html" class="map-container"></iframe>

        <div class="info-card">
            <h4>Peta Partisipatif Wilayah</h4>
            <p>Kelurahan Tanjung Riau, Kota Batam. Gunakan fitur klik pada objek untuk memunculkan informasi detail atribut.</p>
        </div>
    </div>

</body>
</html>
